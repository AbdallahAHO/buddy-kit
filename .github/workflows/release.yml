# Dormant until a remote exists. Tag a release (vX.Y.Z) → build the flasher
# artifacts for every app and attach them to the GitHub Release. Publishing the
# release triggers pages.yml, which fetches this asset and deploys the site —
# pages.yml is the single Pages-deploy owner, so this workflow never deploys
# (avoids a double-deploy race). Dormant-CI posture, see ADR 010/013.
name: Release firmware

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to build, e.g. v0.4.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install 'platformio==6.*'

      - name: Build flasher artifacts (all apps)
        run: python3 tools/export_web_flasher.py --version "${{ steps.version.outputs.value }}"

      - name: Package the firmware tree
        run: tar -czf web-firmware.tar.gz -C web firmware

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.value }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" web-firmware.tar.gz --clobber
          else
            gh release create "$TAG" web-firmware.tar.gz \
              --title "$TAG" \
              --notes "buddy-kit firmware $TAG. Flash from the browser: see web/ (Pages)."
          fi
      # No Pages deploy here — publishing the release above triggers pages.yml,
      # which fetches this asset and deploys. Single owner, no double-deploy.
