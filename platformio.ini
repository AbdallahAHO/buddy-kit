; Root project: native unit tests ONLY. The firmware apps live in
; apps/<name>/platformio.ini and build with `pio run -d apps/<name>`; this
; file exists so `pio test -e native_test` can exercise the pure, Arduino-free
; libs (lib/agent-state, lib/line-bus) on the host. See ADR 002 + docs/extending.md.
[env:native_test]
platform = native
test_framework = unity
lib_extra_dirs = lib
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    throwtheswitch/Unity @ ^2.6.1
build_flags =
    -std=gnu++17
; PlatformIO eagerly *installs* (not compiles) every lib's declared deps when
; it scans ./lib — harmless and CI-cached. Only the libs the test #includes
; (agent-state, line-bus) are actually built on the host.
