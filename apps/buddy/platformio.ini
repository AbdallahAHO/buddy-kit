[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.flash_mode = qio
board_upload.flash_size = 8MB
board_build.partitions = no_ota_8mb.csv
board_build.filesystem = littlefs

; Default chain mode (same as upstream). The + modes (chain+/deep+) break on
; this platform: their preprocessor evaluation stops FS.h/LittleFS resolution.
; Dual-BLE-stack exclusion is handled per env with explicit lib_ignore instead.
lib_ldf_mode = chain
lib_extra_dirs =
    ${PROJECT_DIR}/../../lib
    ${PROJECT_DIR}/../../hal
    ${PROJECT_DIR}/../../vendor

lib_deps =
    moononournation/GFX Library for Arduino
    lewisxhe/XPowersLib
    lewisxhe/SensorLib
    adafruit/Adafruit BusIO
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0
    olikraus/U8g2 @ ^2.35
    ricmoo/QRCode @ ^0.0.1

[env:waveshare-esp32c6-touch-amoled-2-16]
board = esp32-c6-devkitc-1
board_build.mcu = esp32c6
board_build.f_cpu = 160000000L
board_build.flash_mode = qio
; House rule for this board: 460800 is the proven-reliable rate on this Mac.
upload_speed = 460800
upload_port = /dev/cu.usbmodem101
monitor_port = /dev/cu.usbmodem101
; No psram_type, no arduino.memory_type — C6 has no PSRAM.
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DXPOWERS_CHIP_AXP2101
    -DU8G2_USE_LARGE_FONTS
    -DU8G2_FONT_SUPPORT
    -DBOARD_WAVESHARE_ESP32C6_TOUCH_AMOLED_2_16
    -DBUDDY_BLE_NIMBLE
lib_deps =
    ${env.lib_deps}
    h2zero/NimBLE-Arduino @ ^2.0
lib_ignore =
    Adafruit_XCA9554
    Arduino_DriveBus
    BLE

[env:waveshare-esp32s3-touch-amoled-1-8]
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DXPOWERS_CHIP_AXP2101
    -DU8G2_USE_LARGE_FONTS
    -DU8G2_FONT_SUPPORT
    -DBOARD_WAVESHARE_ESP32S3_TOUCH_AMOLED_1_8
    -DBUDDY_BLE_BLUEDROID

